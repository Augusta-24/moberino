<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MOBERINO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Russo+One&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'VCR';
  src: url('VCR_OSD_MONO_1.001.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
}
:root {
  --navy:  #08102a;
  --navy2: #0c1836;
  --white: #f2efe8;
  --dim:   rgba(242,239,232,0.4);
  --line:  rgba(242,239,232,0.07);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

body {
  background: var(--navy);
  color: var(--white);
  font-family: 'VCR', monospace;
  min-height: 100vh;
  overflow-x: hidden;
  padding-bottom: calc(62px + env(safe-area-inset-bottom));
}

/* ── NOISE + SCANLINES ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 9500;
  pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  background-size: 160px 160px;
  opacity: 0.035;
  mix-blend-mode: screen;
}
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 9400;
  pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
}

/* ── FLOATING VHS ICONS ── */
#bg {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 0; overflow: hidden;
}
.bgi {
  position: absolute;
  color: rgba(242,239,232,0.025);
  animation: drift linear infinite;
}
@keyframes drift {
  0%   { transform: translateY(0)   rotate(0deg);  }
  50%  { transform: translateY(-22px) rotate(4deg); }
  100% { transform: translateY(0)   rotate(0deg);  }
}

/* ── PAGES ── */
.page { display: none; position: relative; z-index: 1; }
.page.active { display: block; }

/* ── STICKY HEADER ── */
#hdr {
  position: sticky; top: 0; z-index: 800;
  background: rgba(8,16,42,0.94);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; gap: 10px;
  padding: 11px 16px;
}
#logo {
  font-family: 'Russo One', sans-serif;
  font-size: 24px;
  letter-spacing: 4px;
  color: var(--white);
  flex: 1;
  text-shadow: 0 0 40px rgba(242,239,232,0.08);
}
#logo small {
  display: block;
  font-family: 'VCR', 'Share Tech Mono', monospace;
  font-size: 9px; letter-spacing: 3px;
  color: var(--dim);
  font-weight: normal;
  margin-top: 1px;
}
.hdr-play {
  display: flex; align-items: center; gap: 5px;
  font-size: 10px; letter-spacing: 2px; color: rgba(242,239,232,0.5);
}
.hdr-play svg { width: 10px; height: 10px; fill: rgba(242,239,232,0.5); }

/* ── VHS TRACKING BANDS (whole site) ── */
#vhs-bands {
  position: fixed; inset: 0; z-index: 9200;
  pointer-events: none; overflow: hidden;
}
/* Slow-rolling faint horizontal bands */
#vhs-bands::before {
  content: '';
  position: absolute; inset: -100%;
  background: repeating-linear-gradient(
    0deg,
    transparent      0px,
    transparent      54px,
    rgba(255,255,255,0.016) 54px,
    rgba(255,255,255,0.016) 57px,
    transparent      57px,
    transparent      108px,
    rgba(0,0,0,0.03) 108px,
    rgba(0,0,0,0.03) 112px
  );
  background-size: 100% 140px;
  animation: rollBands 14s linear infinite;
}
/* Single darker sync-pulse band scrolling top→bottom */
#vhs-bands::after {
  content: '';
  position: absolute; left: 0; right: 0;
  height: 5px;
  background: rgba(0,0,0,0.22);
  top: -5px;
  animation: syncBand 11s linear infinite;
}
@keyframes rollBands {
  from { background-position: 0 0; }
  to   { background-position: 0 140px; }
}
@keyframes syncBand {
  from { transform: translateY(0); }
  to   { transform: translateY(calc(100vh + 5px)); }
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.15}}

/* ── TAB BAR — hidden ── */
#tabs {
  display: none !important;
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 800;
  background: rgba(6,12,30,0.97);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid var(--line);
  display: flex;
  padding-bottom: env(safe-area-inset-bottom);
  height: calc(62px + env(safe-area-inset-bottom));
  align-items: stretch;
}
.tab {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 4px;
  background: none; border: none; cursor: pointer;
  color: var(--dim);
  font-family: 'VCR', 'Share Tech Mono', monospace;
  font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  -webkit-tap-highlight-color: transparent;
  transition: color 0.2s;
  padding: 8px 0;
}
.tab.on { color: var(--white); }
.tab svg { width: 20px; height: 20px; stroke-width: 1.5; }
.tab-line {
  width: 20px; height: 1px;
  background: var(--white);
  opacity: 0; transition: opacity 0.2s;
  margin-top: 1px;
}
.tab.on .tab-line { opacity: 1; }

/* ══════════════════════════════════════
   HOME
══════════════════════════════════════ */
/* Home page covers full screen — header is hidden on home */
#pg-home { min-height: 100vh; position: relative; overflow: hidden; }

/* Photo pile — fixed so it covers the entire screen edge to edge */
#collage {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
/* Hide collage when not on home */
#collage.hidden { display: none; }

/* Static pile photos */
.pile-photo {
  position: absolute;
  width: 338px; height: 253px;
  object-fit: cover;
  border: 4px solid #f0ede6;
  box-shadow: 3px 6px 20px rgba(0,0,0,0.9), 0 1px 4px rgba(0,0,0,0.6);
  transform: rotate(var(--r));
  opacity: 1;
}
/* Drops from close (large) down onto the pile */
.falling-leaf {
  position: absolute;
  width: 338px; height: 253px;
  object-fit: cover;
  border: 4px solid #f0ede6;
  box-shadow: 3px 6px 20px rgba(0,0,0,0.9), 0 1px 4px rgba(0,0,0,0.6);
  pointer-events: none;
  opacity: 0;
  animation: dropIn var(--dur) ease-out forwards;
}
@keyframes dropIn {
  0%   { opacity: 0; transform: rotate(var(--r)) scale(2.4) translateY(-18px); }
  8%   { opacity: 1; }
  100% { opacity: 1; transform: rotate(var(--r)) scale(1) translateY(0px); }
}
/* Heavy blue overlay — must be above falling photos (which reach z-index 50000+) */
#collage::after {
  content: '';
  position: absolute; inset: 0;
  background: rgba(8,16,42,0.88);
  pointer-events: none;
  z-index: 999999;
}

/* Hero — padded from top so recommended section is close below */
.home-hero {
  padding: 20vh 24px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  position: relative;
  z-index: 1;
  text-align: center;
}

/* Logo wrap — title PNG has 38% transparent bottom padding; pull search up */
.hero-logo-wrap {
  position: relative;
  width: min(94vw, 640px);
  margin-bottom: -14%;
}
.hero-logo-text {
  display: block;
  width: 100%;
  filter: drop-shadow(0 4px 28px rgba(0,0,0,0.9));
}
/* Cassette flies in and lands in the O gap */
.hero-logo-tape {
  position: absolute;
  left: calc(20% - 38px);
  top: calc(38% - 14px);
  width: 13.5%;
  transform-origin: center center;
  filter: drop-shadow(0 4px 14px rgba(0,0,0,0.8));
  animation: tapeDropIn 2.0s cubic-bezier(0.34,1.1,0.64,1) 0.5s both;
}
@keyframes tapeDropIn {
  0%   { transform: translateY(-300px) rotate(50deg)  scale(0.55); opacity:0; }
  52%  { transform: translateY(5px)    rotate(82deg)  scale(1.05); opacity:1; }
  70%  { transform: translateY(-2px)   rotate(76deg)  scale(0.97); }
  100% { transform: translateY(0)      rotate(78deg)  scale(1);    opacity:1; }
}

/* Search — same width as logo */
.hero-search {
  width: min(94vw, 640px);
  padding-left: 6.9%;
  padding-right: 17.2%;
}
.search-wrap {
  display: flex; align-items: center; gap: 10px;
  background: rgba(180,190,220,0.10);
  border: 1px solid rgba(242,239,232,0.22);
  padding: 12px 16px;
  transition: background 0.2s;
}
.search-wrap:focus-within { background: rgba(180,190,220,0.28); }
.search-wrap svg { width: 15px; height: 15px; color: rgba(242,239,232,0.55); flex-shrink: 0; }
.search-wrap input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--white);
  font-family: 'VCR', 'Share Tech Mono', monospace;
  font-size: 14px; letter-spacing: 3px;
}
.search-wrap input::placeholder { color: rgba(242,239,232,0.45); letter-spacing: 3px; }

/* CTA buttons — same width as logo */
.hero-cta-row {
  display: flex; gap: 10px;
  width: min(94vw, 640px);
}
.hero-cta-btn {
  flex: 1;
  background: #edeae2;
  border: none;
  padding: 12px 8px;
  font-family: 'Bebas Neue', cursive;
  font-size: 15px; letter-spacing: 3px;
  color: #08102a;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  box-shadow: 2px 3px 14px rgba(0,0,0,0.6);
  transition: background 0.12s, transform 0.08s;
}
.hero-cta-btn:active { transform: translateY(1px); }

/* Recommended reveal — tight against the buttons */
#memories {
  position: relative; z-index: 1;
  display: none;
  margin-top: 0;
  animation: fadeUp 0.3s ease both;
}
#memories.open { display: block; }
@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}

/* Stats strip */
.stats-strip {
  display: flex; justify-content: center; gap: 0;
  padding: 28px 16px 0;
  position: relative; z-index: 1;
}
.stat-item {
  flex: 1; text-align: center;
  border-right: 1px solid var(--line);
  padding: 0 8px;
}
.stat-item:last-child { border-right: none; }
.stat-num {
  font-family: 'Bebas Neue', cursive;
  font-size: 28px; letter-spacing: 2px; line-height: 1;
  color: var(--white);
}
.stat-lbl {
  font-size: 9px; letter-spacing: 2px; color: var(--dim);
  margin-top: 3px;
}

/* Season strip */
.season-header {
  display: flex; align-items: baseline; gap: 10px;
  padding: 32px 16px 14px;
  position: relative; z-index: 1;
}
.season-label {
  font-family: 'Bebas Neue', cursive;
  font-size: 18px; letter-spacing: 3px;
  color: var(--white);
}
.season-sub { font-size: 9px; color: var(--dim); letter-spacing: 1px; }

/* ══════════════════════════════════════
   VIDEO GRID  (2-col, Wix-style cards)
══════════════════════════════════════ */
.vgrid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  padding: 0 14px 24px;
}

.vcard {
  position: relative;
  aspect-ratio: 4/3;
  background: var(--navy2);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.12s;
  /* Polaroid frame */
  box-shadow:
    0 0 0 3px rgba(242,239,232,0.82),
    4px 6px 20px rgba(0,0,0,0.7);
}
.vcard:active { transform: scale(0.96); }

/* Corner mounting dots */
.vcard::before, .vcard::after,
.vcard .c3, .vcard .c4 {
  content: '';
  position: absolute;
  width: 9px; height: 9px;
  border-radius: 50%;
  background: rgba(242,239,232,0.75);
  z-index: 4;
}
.vcard::before { top: -4px; left: -4px; }
.vcard::after  { top: -4px; right: -4px; }
.vcard .c3     { bottom: -4px; left: -4px; }
.vcard .c4     { bottom: -4px; right: -4px; }

.vcard-img {
  position: absolute; inset: 0;
  width: 100%; height: 100%; object-fit: cover;
  display: block;
}
.vcard-tint {
  position: absolute; inset: 0; opacity: 0.2; z-index: 1;
}
.vcard-grad {
  position: absolute; inset: 0; z-index: 2;
  background: linear-gradient(to top,
    rgba(8,16,42,0.96) 0%,
    rgba(8,16,42,0.6)  40%,
    rgba(8,16,42,0.1)  80%,
    transparent        100%);
}
.vcard-body {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 6px 8px 9px;
  z-index: 3;
}
.vcard-title {
  font-family: 'Bebas Neue', cursive;
  font-size: clamp(14px, 4.2vw, 20px);
  line-height: 1.05;
  letter-spacing: 1px;
  color: #fff;
  text-shadow: 1px 1px 6px rgba(0,0,0,0.9);
}
.vcard-year {
  font-family: 'Bebas Neue', cursive;
  font-size: clamp(18px, 5.5vw, 26px);
  line-height: 1;
  letter-spacing: 2px;
  color: rgba(242,239,232,0.9);
  text-shadow: 1px 1px 6px rgba(0,0,0,0.9);
}

/* ══════════════════════════════════════
   CATEGORIES  (4-col grid)
══════════════════════════════════════ */
#pg-cats { padding-bottom: 24px; }
.cats-title {
  font-family: 'Bebas Neue', cursive;
  font-size: 13px; letter-spacing: 5px;
  color: var(--dim); padding: 18px 16px 12px;
}
.cgrid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: rgba(242,239,232,0.04);
}
.ctile {
  position: relative;
  aspect-ratio: 1;
  overflow: hidden;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  background: var(--navy2);
}
.ctile:active { opacity: 0.75; }
.ctile-img {
  position: absolute; inset: 0;
  width: 100%; height: 100%; object-fit: cover;
  display: block;
  transition: transform 0.3s;
}
.ctile:hover .ctile-img { transform: scale(1.05); }
.ctile-color { position: absolute; inset: 0; }
.ctile-grad {
  position: absolute; inset: 0;
  background: linear-gradient(to top,
    rgba(8,16,42,0.92) 0%,
    rgba(8,16,42,0.4)  55%,
    transparent 100%);
}
.ctile-lbl {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 4px 3px 6px;
  font-family: 'Bebas Neue', cursive;
  font-size: clamp(8px, 2.4vw, 12px);
  letter-spacing: 0.5px; line-height: 1.1;
  text-align: center; color: #fff;
  text-shadow: 0 1px 4px rgba(0,0,0,0.9);
  z-index: 2;
}

/* ══════════════════════════════════════
   CATEGORY DETAIL
══════════════════════════════════════ */
#pg-detail { padding-bottom: 24px; }
.detail-hdr {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--line);
}
.back-btn {
  background: none; border: none; cursor: pointer;
  color: var(--dim); display: flex; align-items: center; gap: 5px;
  font-family: 'VCR', 'Share Tech Mono', monospace;
  font-size: 10px; letter-spacing: 2px;
  -webkit-tap-highlight-color: transparent;
  padding: 4px 0;
  transition: color 0.15s;
}
.back-btn:hover { color: var(--white); }
.back-btn svg { width: 14px; height: 14px; }
.detail-name {
  font-family: 'Bebas Neue', cursive;
  font-size: 20px; letter-spacing: 3px;
  flex: 1;
}
.detail-cnt { font-size: 10px; color: var(--dim); letter-spacing: 1px; }
.detail-body { padding: 16px 14px 0; }

/* ══════════════════════════════════════
   SEARCH
══════════════════════════════════════ */
#pg-search { padding-bottom: 24px; }
.srch-top { padding: 14px 14px 0; }
.srch-box {
  display: flex; align-items: center; gap: 10px;
  border: 1px solid rgba(242,239,232,0.22);
  background: rgba(242,239,232,0.04);
  padding: 14px 16px;
  transition: border-color 0.2s;
}
.srch-box:focus-within { border-color: rgba(242,239,232,0.55); }
.srch-box svg { width: 18px; height: 18px; color: var(--dim); flex-shrink: 0; }
.srch-box input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--white);
  font-family: 'VCR', 'Share Tech Mono', monospace;
  font-size: 18px; letter-spacing: 1px;
}
.srch-box input::placeholder { color: var(--dim); }
.srch-clear {
  background: none; border: none; cursor: pointer;
  color: var(--dim); padding: 0; line-height: 1;
  transition: color 0.15s;
}
.srch-clear:hover { color: var(--white); }
.srch-meta {
  padding: 10px 16px 12px;
  font-size: 10px; color: var(--dim); letter-spacing: 2px;
}
.srch-body { padding: 0 14px; }
.no-results {
  text-align: center; padding: 64px 16px;
  color: var(--dim); font-size: 11px; letter-spacing: 3px;
}

/* ══════════════════════════════════════
   TUBE TV LIGHTBOX
══════════════════════════════════════ */
#lb {
  display: none;
  position: fixed; inset: 0; z-index: 9000;
  background: #06080f;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0;
}
#lb.open { display: flex; }

/* TV close bar */
#lb-hdr {
  width: 100%; max-width: 520px;
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px 8px;
  flex-shrink: 0;
}
#lb-close {
  background: none; border: none; cursor: pointer;
  color: var(--dim); padding: 4px; line-height: 1;
  transition: color 0.15s;
}
#lb-close:hover { color: var(--white); }
#lb-close svg { width: 20px; height: 20px; }
#lb-info { flex: 1; min-width: 0; }
#lb-title {
  font-family: 'Bebas Neue', cursive;
  font-size: 16px; letter-spacing: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#lb-meta { font-size: 9px; color: var(--dim); letter-spacing: 2px; margin-top: 1px; }

/* Tube TV shell */
#tv-shell {
  width: 100%; max-width: 520px;
  background: linear-gradient(160deg, #1a1208 0%, #0e0c06 60%, #080600 100%);
  border-radius: 18px 18px 12px 12px;
  padding: 14px 14px 0;
  box-shadow:
    inset 2px 2px 10px rgba(255,255,255,0.04),
    inset -2px -2px 10px rgba(0,0,0,0.8),
    0 0 0 3px #2a1f0a,
    0 12px 50px rgba(0,0,0,0.95);
  flex-shrink: 0;
}

/* CRT screen bezel */
#tv-screen-bezel {
  background: #050402;
  border-radius: 10px 10px 8px 8px;
  padding: 8px;
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,0.04),
    inset 0 2px 12px rgba(0,0,0,0.9);
  position: relative;
}

/* The actual CRT screen */
#lb-frame-wrap {
  position: relative;
  aspect-ratio: 16/9;
  border-radius: 6px 6px 10px 10px / 4px 4px 8px 8px; /* barrel curve */
  overflow: hidden;
  background: #000;
  box-shadow:
    inset 0 0 40px rgba(0,0,0,0.9),
    0 0 0 2px #0a0806;
}
#lb-frame {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  border: none;
}
/* CRT reflection overlay */
#lb-frame-wrap::after {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 30% 25%, rgba(255,255,255,0.04) 0%, transparent 60%),
    radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
  pointer-events: none;
  z-index: 5;
}

/* VCR unit */
#vcr-unit {
  background: linear-gradient(to bottom, #141008, #080604);
  border-radius: 0 0 8px 8px;
  margin-top: 0;
  padding: 8px 12px 10px;
  display: flex; align-items: center; gap: 8px;
  border-top: 1px solid rgba(255,255,255,0.05);
}
#vcr-slot {
  flex: 1;
  height: 7px;
  background: #000;
  border-radius: 3px;
  border: 1px solid #2a2010;
  box-shadow: inset 0 2px 4px rgba(0,0,0,1);
}
#vcr-counter {
  font-family: 'VCR', 'Share Tech Mono', monospace;
  font-size: 13px; letter-spacing: 2px;
  color: #00e87a;
  text-shadow: 0 0 8px rgba(0,232,122,0.7);
  background: #010a04;
  padding: 2px 7px;
  border: 1px solid #0a3020;
  border-radius: 3px;
  min-width: 72px; text-align: center;
}
.vcr-btn {
  width: 20px; height: 20px;
  background: linear-gradient(to bottom, #2a2015, #141008);
  border: 1px solid #3a3020;
  border-radius: 3px;
  color: #887755;
  font-size: 9px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0;
  transition: color 0.1s;
}

<script>
// ── CAT COLORS ──
const CC = {
  "Moberg Christmas":"#6b0000","Severino Christmas":"#8B0000",
  "Birthdays":"#7d3000","TDKK":"#3d1a6e",
  "Severino Family":"#0d2e5c","Moberg Family":"#0a3d2e",
  "Severino Holidays":"#5c3200","Moberg Holidays":"#3d1060",
  "Vacations":"#074d42","School Days":"#0e2645",
  "Sports":"#5c2200","Reunions":"#1a2535",
  "Weddings":"#3d2820","Baby Videos":"#5c0a35",
  "Friends":"#0f1a52","Misc":"#151f2e",
};

// ── SEASON ──
function season() {
  const m = new Date().getMonth()+1;
  if(m===12||m===1) return {label:"CHRISTMAS MEMORIES",terms:["christmas","xmas"]};
  if(m===11)        return {label:"THANKSGIVING MEMORIES",terms:["thanksgiving"]};
  if(m===10)        return {label:"HALLOWEEN MEMORIES",terms:["halloween"]};
  if(m>=6&&m<=8)    return {label:"SUMMER MEMORIES",terms:["beach","florida","vacation","montauk","disney","epcot","norway","cayman","cypress","williamsburg"]};
  if(m===4||m===5)  return {label:"SPRING MEMORIES",terms:["easter","mother","memorial"]};
  if(m===3)         return {label:"ST. PATRICK'S DAY",terms:["patrick"]};
  return {label:"FAMILY FAVORITES",terms:[]};
}

function recommended(n) {
  const {terms} = season();
  let pool = terms.length
    ? VIDEOS.filter(v=>{const h=(v.title+' '+v.category).toLowerCase();return terms.some(t=>h.includes(t));})
    : [];
  if(pool.length<4) pool=[...VIDEOS].sort(()=>Math.random()-0.5);
  return pool.slice(0,n);
}

// ── SEARCH ──
function search(q) {
  const terms = q.toLowerCase().trim().split(/\s+/).filter(Boolean);
  if(!terms.length) return [];
  return VIDEOS.filter(v=>{
    const h=`${v.title} ${v.category} ${v.year||''}`.toLowerCase();
    return terms.every(t=>h.includes(t));
  });
}

// ── FORMAT TITLE ──
// Returns {event, year} where event = title without leading year, year = extracted year
function fmtTitle(raw, year) {
  // Strip leading 4-digit year + optional separators
  let event = raw.replace(/^[\d]{4}[\s_\-]*/,'').replace(/_/g,' ').trim();
  if (!event) event = raw.replace(/_/g,' ').trim();
  // Also strip trailing year if it appears at end
  event = event.replace(/\s*(19|20)\d{2}\s*$/, '').trim();
  return event.toUpperCase() || raw.toUpperCase();
}

// ── VIDEO CARD ──
function vcard(v, playlist, idx) {
  const el = document.createElement('div');
  el.className = 'vcard';
  el.onclick = () => openLB(playlist, idx);
  const color = CC[v.category]||'#151f2e';
  const event = fmtTitle(v.title, v.year);
  el.innerHTML = `
    <div class="vcard-tint" style="background:${color}"></div>
    <img class="vcard-img" src="${v.thumb}"
      onerror="this.src='https://img.youtube.com/vi/${v.video_id}/sddefault.jpg';this.onerror=null"
      loading="lazy" alt="">
    <div class="vcard-grad"></div>
    <div class="vcard-body">
      ${v.year ? `<div class="vcard-year">${v.year}</div>` : ''}
      <div class="vcard-title">${event}</div>
    </div>
    <div class="c3"></div><div class="c4"></div>`;
  return el;
}

// ── PHOTO PILE — dense floor, every pixel covered ──
function buildCollage() {
  const c  = document.getElementById('collage');
  const W  = window.innerWidth;
  const H  = window.innerHeight;
  const PW = 338, PH = 253;
  const step = 220; // tight overlap so no gaps

  let pool = [...VIDEOS].sort(() => Math.random() - 0.5);
  let pi   = 0;

  for (let y = -PH; y < H + PH; y += step) {
    for (let x = -PW; x < W + PW; x += step) {
      const v   = pool[pi % pool.length]; pi++;
      const img = document.createElement('img');
      img.className = 'pile-photo';
      img.src = v.thumb;
      img.loading = 'lazy';
      img.alt = '';
      img.onerror = function(){ this.style.display='none'; };

      const jx  = x + (Math.random() - 0.5) * 55;
      const jy  = y + (Math.random() - 0.5) * 45;
      const rot = (Math.random() - 0.5) * 38;

      img.style.cssText = `left:${jx}px;top:${jy}px;z-index:${pi};--r:${rot}deg`;
      c.appendChild(img);
    }
  }
}

// ── CONTINUOUS FALLING — Z-axis drop (tiny → full, like falling toward the camera) ──
let leafZ = 50000;
function startLeafFall() {
  const c = document.getElementById('collage');

  function dropOne() {
    const W    = window.innerWidth;
    const H    = window.innerHeight;
    const v    = VIDEOS[Math.floor(Math.random() * VIDEOS.length)];
    const leaf = document.createElement('img');
    leaf.className = 'falling-leaf';
    leaf.src = v.thumb;
    leaf.alt = '';
    leaf.onerror = function(){ this.remove(); };

    const x    = (Math.random() - 0.1) * W;
    const y    = (Math.random() - 0.05) * H;
    const rot  = (Math.random() - 0.5) * 38;
    const dur  = 1.5 + Math.random() * 1.0; // 1.5–2.5s
    const z    = leafZ++;

    leaf.style.cssText = `left:${x}px;top:${y}px;z-index:${z};--r:${rot}deg;--dur:${dur}s`;
    c.appendChild(leaf);

    // After landing: freeze as part of the pile
    setTimeout(() => {
      leaf.classList.remove('falling-leaf');
      leaf.classList.add('pile-photo');
      leaf.style.cssText = `left:${x}px;top:${y}px;z-index:${z};--r:${rot}deg`;
    }, dur * 1000 + 50);

    setTimeout(dropOne, 5000);
  }

  dropOne();
}

// ── RENDER HOME ──
function renderHome() {
  const s = season();
  document.getElementById('seasonLabel').textContent = s.label;
  const grid = document.getElementById('homeGrid');
  grid.innerHTML='';
  recommended(6).forEach((v,i,a)=>grid.appendChild(vcard(v,a,i)));
}

// ── RENDER CATS ──
function renderCats() {
  const thumbs = {};
  for(const v of VIDEOS) if(!thumbs[v.category]) thumbs[v.category]=v.thumb;
  const grid = document.getElementById('cgrid');
  grid.innerHTML='';
  for(const cat of CATEGORIES) {
    const tile = document.createElement('div');
    tile.className='ctile';
    tile.onclick=()=>openCat(cat);
    const color = CC[cat]||'#151f2e';
    tile.innerHTML=`
      <div class="ctile-color" style="background:${color}"></div>
      ${thumbs[cat]?`<img class="ctile-img" src="${thumbs[cat]}" loading="lazy" alt="" onerror="this.style.display='none'">`:''}
      <div class="ctile-grad"></div>
      <div class="ctile-lbl">${cat.toUpperCase()}</div>`;
    grid.appendChild(tile);
  }
}

// ── OPEN CATEGORY ──
function openCat(cat) {
  const vids = VIDEOS.filter(v=>v.category===cat);
  document.getElementById('detailName').textContent = cat.toUpperCase();
  document.getElementById('detailCnt').textContent = `${vids.length}`;
  const grid = document.getElementById('detailGrid');
  grid.innerHTML='';
  vids.forEach((v,i,a)=>grid.appendChild(vcard(v,a,i)));
  nav('detail');
}
document.getElementById('backBtn').onclick=()=>nav('cats');

// ── LIGHTBOX ──
let lbList=[], lbIdx=0;
let vcrTick = null, vcrSecs = 0;
function vcrStart() {
  vcrSecs = 0;
  document.getElementById('vcr-led-mode').textContent = '▶ PLAY';
  clearInterval(vcrTick);
  vcrTick = setInterval(() => {
    vcrSecs++;
    const m = String(Math.floor(vcrSecs/60)).padStart(2,'0');
    const s = String(vcrSecs%60).padStart(2,'0');
    document.getElementById('vcr-led-time').textContent = `${m}:${s}`;
  }, 1000);
}
function vcrStop() {
  clearInterval(vcrTick);
  document.getElementById('vcr-led-mode').textContent = '■ STOP';
  document.getElementById('vcr-led-time').textContent = '00:00';
  document.getElementById('vcr-tape-title').textContent = '— INSERT TAPE —';
}

function openLB(list, idx) {
  lbList=list; lbIdx=idx;
  drawLB();
  document.getElementById('lb').classList.add('open');
  document.body.style.overflow='hidden';
  vcrStart();
}
function drawLB() {
  const v=lbList[lbIdx];
  document.getElementById('lb-title').textContent=v.title.replace(/_/g,' ').toUpperCase();
  document.getElementById('lb-meta').textContent=[v.category,v.year].filter(Boolean).join(' · ');
  document.getElementById('lb-frame').src=`https://www.youtube.com/embed/${v.video_id}?autoplay=1&rel=0`;
  document.getElementById('lb-counter').textContent=`${lbIdx+1} / ${lbList.length}`;
  document.getElementById('lb-prev').disabled=lbIdx===0;
  document.getElementById('lb-next').disabled=lbIdx===lbList.length-1;
  document.getElementById('vcr-tape-title').textContent = fmtTitle(v.title, v.year) + (v.year ? '  ' + v.year : '');
  vcrStart();
}
function closeLB() {
  document.getElementById('lb').classList.remove('open');
  document.getElementById('lb-frame').src='';
  document.body.style.overflow='';
  vcrStop();
}
document.getElementById('lb-close').onclick=closeLB;
document.getElementById('lb-prev').onclick=()=>{if(lbIdx>0){lbIdx--;drawLB();}};
document.getElementById('lb-next').onclick=()=>{if(lbIdx<lbList.length-1){lbIdx++;drawLB();}};

// Swipe
let tx=0;
const fw=document.getElementById('tv-shell');
fw.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
fw.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>55){
    if(dx<0&&lbIdx<lbList.length-1){lbIdx++;drawLB();}
    if(dx>0&&lbIdx>0){lbIdx--;drawLB();}
  }
});

// ── NAV ──
function nav(p) {
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('on',el.dataset.p===p));
  document.getElementById(`pg-${p}`)?.classList.add('active');
  if(p!=='detail') window.scrollTo(0,0);
  // Show collage + hide header on home; reverse on other pages
  const onHome = p === 'home';
  document.getElementById('collage').classList.toggle('hidden', !onHome);
  document.getElementById('hdr').style.display = onHome ? 'none' : 'flex';
}

function toggleRec() {
  const m = document.getElementById('memories');
  m.classList.toggle('open');
  document.getElementById('recBtn').textContent = m.classList.contains('open') ? 'HIDE ▲' : 'RECOMMENDED';
}

// ── SEARCH WIRING ──
const homeQ = document.getElementById('homeQ');
const srchQ = document.getElementById('srchQ');

homeQ.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&homeQ.value.trim()){
    srchQ.value=homeQ.value;
    nav('search'); doSearch(homeQ.value);
  }
});
homeQ.addEventListener('input',()=>{
  if(homeQ.value.length>=2){
    srchQ.value=homeQ.value;
    nav('search'); doSearch(homeQ.value);
  }
});

let timer=null;
srchQ.addEventListener('input',()=>{
  clearTimeout(timer);
  timer=setTimeout(()=>doSearch(srchQ.value),180);
});
document.getElementById('srchClear').onclick=()=>{
  srchQ.value=''; doSearch(''); srchQ.focus();
};

function doSearch(q) {
  const meta=document.getElementById('srchMeta');
  const grid=document.getElementById('srchGrid');
  const noRes=document.getElementById('noRes');
  if(!q.trim()){
    grid.innerHTML=''; noRes.style.display='none';
    meta.textContent=`TYPE TO SEARCH ${VIDEOS.length} VIDEOS`;
    return;
  }
  const res=search(q);
  meta.textContent=`${res.length} RESULT${res.length!==1?'S':''} FOR "${q.toUpperCase()}"`;
  grid.innerHTML='';
  noRes.style.display=res.length?'none':'block';
  res.forEach((v,i,a)=>grid.appendChild(vcard(v,a,i)));
}

// ── INIT ──
// Start on home — hide header, show collage
document.getElementById('hdr').style.display = 'none';
renderHome();
renderCats();
buildCollage();
startLeafFall();
</script>
